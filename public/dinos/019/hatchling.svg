<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="24" fill="#D1FAE5"/>
  <g transform="translate(256, 280)">
    <!-- Egg shell bottom -->
    <ellipse cx="0" cy="20" rx="80" ry="60" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="3"/>
    <!-- Egg crack zigzag -->
    <path d="M-60,-10 L-40,-20 L-20,0 L0,-25 L20,0 L40,-20 L60,-10" stroke="#9CA3AF" stroke-width="3" fill="none"/>
    <!-- Baby dino head poking out -->
    <circle cx="0" cy="-50" r="45" fill="#86EFAC"/>
    <!-- Eyes -->
    <circle cx="-15" cy="-58" r="12" fill="white"/>
    <circle cx="15" cy="-58" r="12" fill="white"/>
    <circle cx="-13" cy="-56" r="7" fill="#1C1917"/>
    <circle cx="17" cy="-56" r="7" fill="#1C1917"/>
    <!-- Eye shine -->
    <circle cx="-10" cy="-59" r="3" fill="white"/>
    <circle cx="20" cy="-59" r="3" fill="white"/>
    <!-- Tiny smile -->
    <path d="M-10,-38 Q0,-30 10,-38" stroke="#1C1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Tiny horn bumps -->
    <circle cx="-20" cy="-85" r="6" fill="#4ADE80"/>
    <circle cx="0" cy="-90" r="7" fill="#4ADE80"/>
    <circle cx="20" cy="-85" r="6" fill="#4ADE80"/>
  </g>
  <!-- Label -->
  <text x="256" y="430" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#16A34A">Hatchling</text>
</svg>
