<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="24" fill="#FEE2E2"/>
  <g transform="translate(256, 250)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="90" ry="60" fill="#F87171"/>
    <!-- Tail -->
    <path d="M75,20 Q120,-10 160,10 Q180,20 170,15" stroke="#EF4444" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Tail spikes -->
    <polygon points="155,5 165,-10 170,8" fill="#DC2626"/>
    <!-- Neck -->
    <path d="M-50,-10 Q-70,-60 -45,-100" stroke="#F87171" stroke-width="35" fill="#F87171" stroke-linecap="round"/>
    <!-- Head -->
    <ellipse cx="-40" cy="-115" rx="42" ry="32" fill="#F87171"/>
    <!-- Jaw -->
    <path d="M-72,-108 L-85,-98 L-60,-102" fill="#EF4444"/>
    <!-- Teeth -->
    <path d="M-75,-100 L-72,-92 L-68,-100 L-65,-92 L-62,-100" stroke="white" stroke-width="2" fill="white"/>
    <!-- Eye -->
    <circle cx="-45" cy="-125" r="12" fill="white"/>
    <circle cx="-43" cy="-124" r="7" fill="#1C1917"/>
    <circle cx="-40" cy="-127" r="3" fill="white"/>
    <!-- Angry brow -->
    <path d="M-58,-132 L-44,-138" stroke="#1C1917" stroke-width="3" stroke-linecap="round"/>
    <!-- Back spines -->
    <polygon points="-30,-38 -20,-60 -10,-38" fill="#DC2626"/>
    <polygon points="0,-40 10,-65 20,-40" fill="#DC2626"/>
    <polygon points="30,-36 40,-58 50,-36" fill="#DC2626"/>
    <!-- Legs -->
    <rect x="-35" y="68" width="22" height="55" rx="11" fill="#EF4444"/>
    <rect x="15" y="68" width="22" height="55" rx="11" fill="#EF4444"/>
    <!-- Arms -->
    <rect x="-70" y="0" width="14" height="32" rx="7" fill="#EF4444" transform="rotate(-15 -70 0)"/>
    <!-- Aura/power lines -->
    <circle cx="0" cy="20" r="110" stroke="#DC2626" stroke-width="2" opacity="0.15" fill="none"/>
    <circle cx="0" cy="20" r="130" stroke="#DC2626" stroke-width="1.5" opacity="0.1" fill="none"/>
  </g>
  <!-- Label -->
  <text x="256" y="440" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#DC2626">Adult</text>
</svg>
