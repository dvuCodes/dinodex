<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="50%" style="stop-color:#16A34A"/>
      <stop offset="100%" style="stop-color:#15803D"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <linearGradient id="belly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF9C3"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Dino body -->
  <ellipse cx="30" cy="38" rx="14" ry="12" fill="url(#body)"/>
  <!-- Belly -->
  <ellipse cx="28" cy="40" rx="8" ry="7" fill="url(#belly)"/>
  <!-- Head -->
  <circle cx="40" cy="24" r="10" fill="url(#body)"/>
  <!-- Snout -->
  <ellipse cx="47" cy="26" rx="6" ry="4" fill="url(#body)"/>
  <!-- Eye (anime style - big and sparkly) -->
  <circle cx="42" cy="22" r="4" fill="white"/>
  <circle cx="43" cy="21.5" r="2.8" fill="#1C1917"/>
  <circle cx="44" cy="20" r="1.2" fill="white"/>
  <circle cx="42" cy="23" r="0.6" fill="white"/>
  <!-- Mouth -->
  <path d="M46 28 Q49 30 52 28" stroke="#15803D" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Spines on back -->
  <path d="M24 28 L22 22 L26 26" fill="#16A34A"/>
  <path d="M28 26 L27 19 L31 24" fill="#16A34A"/>
  <path d="M33 25 L33 18 L37 23" fill="#16A34A"/>
  <!-- Tail -->
  <path d="M16 38 Q8 34 10 28" stroke="url(#body)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="22" y="46" width="5" height="8" rx="2.5" fill="url(#body)"/>
  <rect x="33" y="46" width="5" height="8" rx="2.5" fill="url(#body)"/>
  <!-- Tiny arms -->
  <rect x="40" y="32" width="3" height="6" rx="1.5" fill="url(#body)" transform="rotate(-30 41 32)"/>
  <!-- Nostril -->
  <circle cx="50" cy="25" r="0.8" fill="#15803D"/>
</svg>
